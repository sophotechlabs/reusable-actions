name: Release Please

on:
  push:
    branches: [main]

permissions: {}

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Maintain floating major and minor tags
        if: ${{ steps.release.outputs.release_created == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ steps.release.outputs.sha }}
          MAJOR: ${{ steps.release.outputs.major }}
          MINOR: ${{ steps.release.outputs.minor }}
        run: |
          for ref in "v${MAJOR}" "v${MAJOR}.${MINOR}"; do
            gh api -X PATCH "repos/${REPO}/git/refs/tags/${ref}" -f sha="${SHA}" -F force=true \
              || gh api -X POST "repos/${REPO}/git/refs" -f ref="refs/tags/${ref}" -f sha="${SHA}"
          done
